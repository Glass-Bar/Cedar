plugins {
    id 'com.android.application'
}

android {
    // AGP 8.x requires namespace (replaces package in manifest)
    namespace 'com.ciube.glass.launcher'

    // AGP 8.x requires compileSdk >= 21; 21 is the minimum we can use
    compileSdk 21

    defaultConfig {
        applicationId 'com.ciube.glass.launcher'
        minSdk 19           // Glass XE24 = Android 4.4.2 (API 19)
        targetSdk 19
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        // Java 8 source/target is the minimum AGP 8.x accepts
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // gdk.jar lives in app/libs/
    // compileOnly = used at compile time only, NOT bundled in the APK
    // (the GDK already lives on the Glass device)
    compileOnly fileTree(dir: 'libs', include: ['*.jar'])
}
